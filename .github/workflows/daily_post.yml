name: Twitter Bot

on:
  schedule:
    - cron: '0 15 * * 1-5'  # 17:00 czasu polskiego (UTC+2)
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    environment: env

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        run: python post_on_twitter.py
